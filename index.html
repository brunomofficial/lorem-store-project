<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <div class="top-left">
            <img src="./assets/cart.png" id="cartToggle" alt="cart" 
            height="40px" title="view cart">
        </div>

        <span class="logo">LOREM STORE</span>

        <div class="top-right">
            <button id="account">Bal: <span id="balanceDisplay">$1000</span></button>         
        </div>
    </div>
  
    <button class="side-toggle" id="side-toggle" title="Hide sidebar">
            &lt <!--&gt for close tag-->
    </button>

    <div class="container">
        <div class="sidebar" id="sidebar">
        
            <br>
            <span onclick="reloadData()">Products</span>
            <span id="sortHtoL">Sort<br>(high-low)</span>
            <span id="sortLtoH">Sort<br>(low-high)</span>
            <div id="filterDiv">
                <span>Filter</span>
                <input type="number" placeholder="max" id="maxInput">
                <input type="number" placeholder="min" id="minInput">
                <button id="filterBtn">filter</button>
            </div>
            
            <span id="resetBal">Reset balance</span>
                
    </div>

    <div class="content">
        <div id="searchDiv">
            <!--<button id="clearSearchBtn">clear search</button>-->
            <input type="text" placeholder="Search for a product" id="search-input">
            <button id="searchBtn">🔍</button>
        </div>


        <div class="main-display" id="main-display">
            <div class="items" id="items"></div>
        </div>
    </div>

    <div id="productFocus">
        <button id="closeProductFocusBtn" class="closeFocusBtn">x</button>
        <span id="focusedAlt" class="focusedAlt"></span>
        <span id="focusedName" class="focusedName"></span>
        <span id="focusedPrice" class="focusedPrice"></span>
        <button id="addToCartBtn" class="addToCartBtn">Add to Cart</button>
        <span id="descriptionTitle" class="descriptionTitle">Description</span>
        <p id="productDescription" class="productDescription"></p>

    </div>

    <div id="cartFocus">
        <button id="closeCartFocusBtn">x</button>
        <span id="cartTitleSpan">Your Cart</span>
        <div id="cartItemsDisplay"></div>
    </div>
    </div>

    <script src="data.js"></script>
    <script src="index.js"></script>
    
</body>
</html>
